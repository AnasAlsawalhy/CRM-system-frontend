<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacts - Fire Rocks CRM</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <h2>Fire Rocks CRM</h2>

        <nav>
          <a href="dashboard.html">Dashboard</a>
          <a href="customers.html">Customers</a>
          <a href="contacts.html" class="active">Contacts</a>
          <a href="deals.html">Deals</a>
          <a href="reminders.html">Reminders</a>
          <a href="users.html">Users</a>
        </nav>

        <button id="logoutBtn" class="logout-btn">Logout</button>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <h1>Contacts</h1>
            <p>Manage customer contacts</p>
          </div>
        </header>

        <section class="page-section">
          <h2>Add New Contact</h2>

          <form id="contactForm" class="form-grid">
            <div class="form-group">
              <label>Customer</label>
              <select id="customerId" required>
                <option value="">Select customer</option>
              </select>
            </div>

            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="fullName" required />
            </div>

            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" />
            </div>

            <div class="form-group">
              <label>Phone</label>
              <input type="text" id="phone" />
            </div>

            <div class="form-group">
              <label>Job Title</label>
              <input type="text" id="jobTitle" />
            </div>

            <button type="submit">Add Contact</button>
          </form>

          <p id="message"></p>
        </section>

        <section class="page-section">
          <div class="section-header">
            <h2>Contacts List</h2>
            <button id="refreshBtn" class="small-btn">Refresh</button>
          </div>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Id</th>
                  <th>Customer Id</th>
                  <th>Full Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Job Title</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="contactsTableBody">
                <tr>
                  <td colspan="7">Loading contacts...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/contacts.js"></script>
  </body>
</html>
