<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customers - Fire Rocks CRM</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <h2>Fire Rocks CRM</h2>

        <nav>
          <a href="dashboard.html">Dashboard</a>
          <a href="customers.html" class="active">Customers</a>
          <a href="contacts.html">Contacts</a>
          <a href="deals.html">Deals</a>
          <a href="reminders.html">Reminders</a>
          <a href="users.html">Users</a>
        </nav>

        <button id="logoutBtn" class="logout-btn">Logout</button>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <h1>Customers</h1>
          </div>
        </header>

        <section class="page-section">
          <h2>Add New Customer</h2>

          <form id="customerForm" class="form-grid">
            <div class="form-group">
              <label>Name</label>
              <input type="text" id="name" required />
            </div>

            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" />
            </div>

            <div class="form-group">
              <label>Phone</label>
              <input type="text" id="phone" />
            </div>

            <div class="form-group">
              <label>Address</label>
              <input type="text" id="address" />
            </div>

            <button type="submit">Add Customer</button>
          </form>

          <p id="message"></p>
        </section>

        <section class="page-section">
          <div class="section-header">
            <h2>Customers List</h2>
            <button id="refreshBtn" class="small-btn">Refresh</button>
          </div>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Id</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Address</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="customersTableBody">
                <tr>
                  <td colspan="6">Loading customers...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/customers.js"></script>
  </body>
</html>
