<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users - Fire Rocks CRM</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <h2>Fire Rocks CRM</h2>

        <nav>
          <a href="dashboard.html">Dashboard</a>
          <a href="customers.html">Customers</a>
          <a href="contacts.html">Contacts</a>
          <a href="deals.html">Deals</a>
          <a href="reminders.html">Reminders</a>
          <a href="users.html" class="active">Users</a>
        </nav>

        <button id="logoutBtn" class="logout-btn">Logout</button>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <h1>Users</h1>
            <p>Admin only - manage system users</p>
          </div>
        </header>

        <section class="page-section">
          <h2>Add New User</h2>

          <form id="userForm" class="form-grid">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="fullName" required />
            </div>

            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" required />
            </div>

            <div class="form-group">
              <label>Password</label>
              <input type="password" id="password" required />
            </div>

            <div class="form-group">
              <label>Role</label>
              <select id="role" required>
                <option value="HR">HR</option>
                <option value="Sales">Sales</option>
                <option value="Support">Support</option>
                <option value="Manager">Manager</option>
                <option value="Admin">Admin</option>
              </select>
            </div>

            <div class="form-group">
              <label>Status</label>
              <select id="isActive" required>
                <option value="true">Active</option>
                <option value="false">Inactive</option>
              </select>
            </div>

            <button type="submit">Add User</button>
          </form>

          <p id="message"></p>
        </section>

        <section class="page-section">
          <div class="section-header">
            <h2>Users List</h2>
            <button id="refreshBtn" class="small-btn">Refresh</button>
          </div>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Id</th>
                  <th>Full Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Active</th>
                  <th>Created At</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr>
                  <td colspan="7">Loading users...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/users.js"></script>
  </body>
</html>
